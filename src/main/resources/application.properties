spring.profiles.active=local
spring.application.name=Ling-innerflow
# ===== ????? =====
# ??MySQL???H2???
spring.datasource.url=jdbc:mysql://localhost:3306/innerflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root


# JPA????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Knife4j =====
springdoc.api-docs.enabled=true
knife4j.enable=true

# ===== OpenAI?? =====

spring.ai.openai.chat.options.model=gpt-4o-mini

# ??Redis??
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Pinecone

pinecone.index-name=innerflow-cbt

# Memory compression
memory.compression.threshold=10
memory.compression.keep-recent=4

# RAG config
rag.pinecone.top-k=3
rag.pinecone.score-threshold=0.7
# Candidate pool sizes for HyDE + re-ranking (increase to improve recall)
rag.pinecone.candidate-k=10
rag.es.candidate-k=5

# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=innerflow-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# JWT
jwt.expiration=86400000

# Kafka??????
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual

# Kafka?????????partition????
spring.kafka.listener.concurrency=3

# ?? Nacos?????????
spring.cloud.nacos.config.enabled=false
spring.cloud.nacos.discovery.enabled=false
spring.cloud.nacos.config.import-check.enabled=false
spring.config.import=optional:nacos:

# ===== Observability: Actuator + distributed tracing (OTLP -> Tempo) =====
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.1}
management.otlp.tracing.endpoint=${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
