        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>InnerFlow WebSocket测试</title>
            <style>
                body { font-family: Arial; max-width: 600px; margin: 50px auto; }
                #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
                .user { color: blue; }
                .ai { color: green; }
                .system { color: gray; font-style: italic; }
                input { width: 80%; padding: 8px; }
                button { padding: 8px 16px; }
            </style>
        </head>
        <body>
        <h2>InnerFlow 实时对话</h2>
        <div id="messages"></div>
        <input id="input" placeholder="说说你的感受..." />
        <button onclick="send()">发送</button>

        <script>
            const userId = "1";
            const ws = new WebSocket(
                `ws://localhost:8080/ws/emotion?userId=${userId}`);
            let aiBuffer = "";

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const messages = document.getElementById("messages");

                if (data.type === "connected") {
                    addMessage("系统", data.message, "system");
                } else if (data.type === "emotion") {
                    addMessage("系统",
                        `情绪等级：L${data.level} - ${data.description}`,
                        "system");
                    aiBuffer = "";
                } else if (data.type === "chunk") {
                    aiBuffer += data.content;
                    // 实时更新AI回复
                    updateAiMessage(aiBuffer);
                } else if (data.type === "done") {
                    aiBuffer = "";
                } else if (data.type === "response") {
                    addMessage("AI", data.content, "ai");
                }
            };

            function send() {
                const input = document.getElementById("input");
                const text = input.value.trim();
                if (!text) return;
                addMessage("你", text, "user");
                ws.send(text);
                input.value = "";
            }

            function addMessage(role, text, cls) {
                const messages = document.getElementById("messages");
                const div = document.createElement("div");
                div.className = cls;
                div.id = cls === "ai" ? "current-ai" : "";
                div.textContent = `${role}: ${text}`;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            }

            function updateAiMessage(text) {
                let el = document.getElementById("current-ai");
                if (!el) {
                    el = document.createElement("div");
                    el.className = "ai";
                    el.id = "current-ai";
                    document.getElementById("messages").appendChild(el);
                }
                el.textContent = `AI: ${text}`;
                el.id = "";
            }

            document.getElementById("input").addEventListener(
                "keypress", (e) => {
                    if (e.key === "Enter") send();
                });
        </script>
        </body>
        </html>
