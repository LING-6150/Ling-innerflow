spring.application.name=Ling-innerflow

# ===== Database =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== OpenAI =====
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}

# ===== Pinecone =====
pinecone.api-key=${PINECONE_API_KEY}
pinecone.index-name=innerflow-cbt
rag.pinecone.top-k=3
rag.pinecone.score-threshold=0.7

# ===== Elasticsearch =====
spring.elasticsearch.uris=${ELASTICSEARCH_URI}

# ===== Kafka =====
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=innerflow-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual
spring.kafka.listener.concurrency=3

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===== Knife4j (off in prod) =====
springdoc.api-docs.enabled=false
knife4j.enable=false
