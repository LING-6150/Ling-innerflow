version: "3.9"

services:

  # ── MySQL ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: innerflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: innerflow
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/nacos-mysql-init.sql:/docker-entrypoint-initdb.d/02-nacos-init.sql:ro
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: innerflow-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    mem_limit: 160m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Kafka (KRaft, no Zookeeper) ────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: innerflow-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    mem_limit: 400m
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s

  # ── Elasticsearch ──────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: innerflow-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s

  # ── Nacos 配置中心 + 服务注册 ───────────────────────────────────
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: innerflow-nacos
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${DB_PASSWORD}
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      JVM_XMS: 128m
      JVM_XMX: 256m
      JVM_XMN: 64m
    mem_limit: 400m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Sentinel Dashboard ─────────────────────────────────────────
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.7
    container_name: innerflow-sentinel
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "8858:8858"

  # ── SkyWalking OAP Server ──────────────────────────────────────
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: innerflow-skywalking-oap
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch:9200
      SW_CORE_RECORD_DATA_TTL: 3
      SW_CORE_METRICS_DATA_TTL: 7
      JAVA_OPTS: "-Xms256m -Xmx512m"
    mem_limit: 600m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:12800/internal/l7check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 90s

  # ── SkyWalking UI ──────────────────────────────────────────────
  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: innerflow-skywalking-ui
    restart: unless-stopped
    depends_on:
      skywalking-oap:
        condition: service_healthy
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    mem_limit: 128m
    ports:
      - "8090:8080"

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: innerflow-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    mem_limit: 256m
    ports:
      - "9090:9090"

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: innerflow-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    mem_limit: 256m
    ports:
      - "3000:3000"

  # ── Spring Boot App ────────────────────────────────────────────
  app:
    build: .
    container_name: innerflow-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/innerflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ""
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ELASTICSEARCH_URI: http://elasticsearch:9200
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    mem_limit: 512m
    ports:
      - "8080:8080"

  # ── Nginx (Vue 3 frontend) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: innerflow-nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 64m
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
  kafka_data:
  es_data:
  prometheus_data:
  grafana_data:
